# Configuración de formato Groovy para Spotless (Greclipse formatter).
# Aplica a: build.gradle y archivos *.gradle del proyecto QA.
# Documentación: https://github.com/diffplug/spotless/tree/main/plugin-gradle#groovy

# Indentación: 4 espacios (convención Groovy / Gradle)
org.eclipse.jdt.core.formatter.tabulation.char=space
org.eclipse.jdt.core.formatter.tabulation.size=4
org.eclipse.jdt.core.formatter.indentation.size=4

# Longitud máxima de línea: 120 caracteres (Gradle DSL suele ser verboso)
org.eclipse.jdt.core.formatter.lineSplit=120

# Llaves: opening brace en la misma línea (K&R style)
org.eclipse.jdt.core.formatter.brace_position_for_block=end_of_line
org.eclipse.jdt.core.formatter.brace_position_for_method_declaration=end_of_line
org.eclipse.jdt.core.formatter.brace_position_for_type_declaration=end_of_line

# Espacios alrededor de operadores
org.eclipse.jdt.core.formatter.insert_space_before_assignment_operator=insert
org.eclipse.jdt.core.formatter.insert_space_after_assignment_operator=insert
org.eclipse.jdt.core.formatter.insert_space_before_binary_operator=insert
org.eclipse.jdt.core.formatter.insert_space_after_binary_operator=insert

# Espacios en parámetros de métodos
org.eclipse.jdt.core.formatter.insert_space_before_opening_paren_in_method_declaration=do_not_insert
org.eclipse.jdt.core.formatter.insert_space_after_opening_paren_in_method_declaration=do_not_insert
org.eclipse.jdt.core.formatter.insert_space_before_closing_paren_in_method_declaration=do_not_insert

# Espacios en llamadas a métodos
org.eclipse.jdt.core.formatter.insert_space_before_opening_paren_in_method_invocation=do_not_insert
org.eclipse.jdt.core.formatter.insert_space_after_opening_paren_in_method_invocation=do_not_insert
org.eclipse.jdt.core.formatter.insert_space_before_closing_paren_in_method_invocation=do_not_insert

# Blank lines
org.eclipse.jdt.core.formatter.blank_lines_before_field=0
org.eclipse.jdt.core.formatter.blank_lines_after_imports=1
org.eclipse.jdt.core.formatter.blank_lines_between_type_declarations=1
