# ==============================================================================
# CONFIGURACION JUnit Platform + Cucumber Parallel Execution
# ==============================================================================
#
# Este archivo es leido automaticamente por JUnit Platform y por el motor
# cucumber-junit-platform-engine al ejecutar: ./gradlew test
#
# Las propiedades definidas aqui pueden sobreescribirse desde linea de
# comandos con: -Dcucumber.filter.tags="@Smoke"
# --- Ejecucion Paralela -------------------------------------------------------
# Habilita el pool de hilos de Cucumber JUnit Platform Engine.
# IMPORTANTE: parallelism=3 es el máximo recomendado para máquinas locales
# sin degradación de performance. Más threads causan flakiness por competencia
# de recursos (ChromeDriver, RAM, CPU). En CI/CD se puede aumentar si la infra lo permite.
#
# Con strategy=fixed y parallelism=3, hasta 3 escenarios corren al mismo tiempo.
# El tiempo total es el del escenario mas largo, no la suma de todos.
# Beneficio: 50-70% más rápido que secuencial, sin sacrificar estabilidad.
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=3
cucumber.execution.parallel.config.fixed.max-pool-size=3
# Modo de ejecucion: los escenarios corren en paralelo, pero los steps dentro
# de un mismo escenario son secuenciales (no hay race conditions entre steps).
cucumber.execution.parallel.execution-mode.default=CONCURRENT
# --- Rutas y Glue -------------------------------------------------------------
cucumber.features=classpath:features
cucumber.glue=steps,hooks
# --- Filtro de Tags (default) -------------------------------------------------
# Sobreescribir con: ./gradlew test -Dcucumber.filter.tags="@Smoke"
# La fase principal corre regresion en paralelo y excluye escenarios destructivos.
cucumber.filter.tags=@Regression and not @Destructive
# --- Plugins de Reporte -------------------------------------------------------
# NOTA: El plugin json: se omite intencionalmente - el formateador JSON
# estandar de Cucumber no es thread-safe para escritura concurrente.
# Los reportes se generan a traves de Allure (archivos individuales por UUID)
# y ExtentReports (thread-safe en v1.14.0).
#
# IMPORTANTE: Se REMOVIO el plugin pretty que imprimia TODO a STDOUT.
# Ahora la consola solo muestra el resumen final de TestExecutionSummary.
cucumber.plugin=io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm,com.aventstack.extentreports.cucumber.adapter.ExtentCucumberAdapter:
# --- Presentacion -------------------------------------------------------------
# Silenciar mensajes innecesarios de Cucumber en consola
cucumber.publish.quiet=true
cucumber.ansi-colors.disabled=false
