# Configuracion base del framework
# Sobreescribir base.url segun el ambiente del equipo (DEV/QA/PROD).
base.url=https://example.local
# URL de la aplicacion de verificacion Luhn (app piloto de automatizacion).
# En CI/CD configurar la variable de entorno LUHN_BASE_URL en GitLab Settings.
luhn.url=https://portaldesar:8444/luhn-verification/
browser=chrome
# browser.headless: true para CI/CD o parallelism >= 4. En CI se activa automaticamente via CI=true.
browser.headless=false
timeout.default=15
timeout.fast=5
timeout.slow=30
